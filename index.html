
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MathViz - Interactive Mathematics</title>
   
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Styles and Theming -->
    <style>
        :root {
            /* Light Theme Defaults */
            --bg-body: #f8fafc;
            --bg-panel: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --canvas-bg: #f8fafc;
            --grid-line: #cbd5e1;
            --grid-line-thick: #94a3b8;
            --accent: #10b981;
            --accent-hover: #059669;
            --shape-stroke: #1e293b;
            --handle-fill: #ffffff;
            --handle-stroke: #10b981;
        }

        .dark-theme {
            /* Dark Theme (Default) */
            --bg-body: #020617;
            --bg-panel: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #1e293b;
            --canvas-bg: #0b1120;
            --grid-line: #1e293b;
            --grid-line-thick: #334155;
            --shape-stroke: #f8fafc;
            --handle-fill: #0f172a;
        }

        .high-contrast {
            --bg-body: #000000;
            --bg-panel: #000000;
            --text-main: #ffffff;
            --text-muted: #ffffff;
            --border: #ffffff;
            --canvas-bg: #000000;
            --grid-line: #444444;
            --grid-line-thick: #ffff00;
            --accent: #00ff00;
            --shape-stroke: #ffffff;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            touch-action: none; /* Prevent scroll on canvas drag */
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        .panel {
            background-color: var(--bg-panel);
            border-color: var(--border);
        }

        /* Sidebar transitions */
        #left-sidebar, #right-sidebar {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s;
        }

        /* Present Mode Overrides */
        body.presenting #left-sidebar { transform: translateX(-100%); width: 0; border: none; }
        body.presenting #right-sidebar { transform: translateX(100%); width: 0; border: none; }
        body.presenting #top-navbar { transform: translateY(-100%); height: 0; overflow: hidden; border: none; }
        body.presenting .present-scale { font-size: 1.5rem; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* Spotlight Effect */
        #spotlight-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 50; display: none;
            background: radial-gradient(circle 200px at 50% 50%, transparent 0%, rgba(0,0,0,0.85) 100%);
        }
        body.high-contrast #spotlight-overlay {
            background: radial-gradient(circle 200px at 50% 50%, transparent 0%, rgba(0,0,0,0.95) 100%);
        }

        input[type="range"] {
            accent-color: var(--accent);
        }
       
        button, select, input {
            background-color: var(--bg-panel);
            color: var(--text-main);
            border: 1px solid var(--border);
        }
       
        .btn-accent {
            background-color: var(--accent);
            color: white;
            border: none;
        }
        .btn-accent:hover {
            background-color: var(--accent-hover);
        }
       
        .nav-tab.active {
            border-bottom: 2px solid var(--accent);
            color: var(--accent);
        }

        #presentation-toolbar {
            transition: opacity 0.3s;
        }
    </style>
</head>
<body class="dark-theme flex flex-col h-screen select-none">

    <!-- Spotlight Overlay -->
    <div id="spotlight-overlay"></div>

    <!-- Top Navbar -->
    <header id="top-navbar" class="panel border-b flex items-center justify-between px-4 py-3 z-10 transition-transform duration-300">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold flex items-center gap-2 text-[var(--accent)]">
                <i class="fa-solid fa-shapes"></i> MathViz
            </h1>
            <nav class="flex gap-2 ml-8">
                <button class="nav-tab active px-4 py-1 font-medium transition-colors" onclick="setMode('geometry')">Geometry</button>
                <button class="nav-tab px-4 py-1 font-medium transition-colors" onclick="setMode('graph')">Graphing</button>
            </nav>
        </div>
        <div class="flex items-center gap-3">
            <button class="w-10 h-10 rounded-full hover:bg-[var(--border)] transition-colors" onclick="toggleTheme()" title="Toggle Theme">
                <i class="fa-solid fa-moon" id="theme-icon"></i>
            </button>
            <button class="btn-accent px-5 py-2 rounded shadow-md font-semibold flex items-center gap-2" onclick="togglePresentation()">
                <i class="fa-solid fa-expand"></i> Present
            </button>
        </div>
    </header>

    <!-- Main Content Layout -->
    <main class="flex-1 flex overflow-hidden relative">
       
        <!-- Left Sidebar: Geometry Tools -->
        <aside id="left-sidebar" class="panel border-r w-64 flex flex-col z-10 overflow-y-auto relative">
            <div id="geom-tools" class="p-4 space-y-6">
                <div>
                    <h3 class="text-sm uppercase tracking-wider text-[var(--text-muted)] font-semibold mb-3">Insert Shape</h3>
                    <div class="grid grid-cols-2 gap-2">
                        <button class="p-2 border rounded hover:border-[var(--accent)] hover:text-[var(--accent)] flex flex-col items-center gap-1 transition-colors" onclick="addShape('right_triangle')">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21L21 21L3 3Z"/></svg>
                            <span class="text-xs">Right Tri</span>
                        </button>
                        <button class="p-2 border rounded hover:border-[var(--accent)] hover:text-[var(--accent)] flex flex-col items-center gap-1 transition-colors" onclick="addShape('equilateral')">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3L21 21H3Z"/></svg>
                            <span class="text-xs">Equilateral</span>
                        </button>
                        <button class="p-2 border rounded hover:border-[var(--accent)] hover:text-[var(--accent)] flex flex-col items-center gap-1 transition-colors" onclick="addShape('scalene')">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 3L21 21H3Z"/></svg>
                            <span class="text-xs">Scalene</span>
                        </button>
                        <button class="p-2 border rounded hover:border-[var(--accent)] hover:text-[var(--accent)] flex flex-col items-center gap-1 transition-colors" onclick="addShape('circle')">
                            <i class="fa-regular fa-circle text-xl"></i>
                            <span class="text-xs">Circle</span>
                        </button>
                        <button class="p-2 border rounded hover:border-[var(--accent)] hover:text-[var(--accent)] flex flex-col items-center gap-1 transition-colors" onclick="addShape('rectangle')">
                            <i class="fa-regular fa-square text-xl"></i>
                            <span class="text-xs">Rectangle</span>
                        </button>
                        <button class="p-2 border rounded hover:border-[var(--accent)] hover:text-[var(--accent)] flex flex-col items-center gap-1 transition-colors" onclick="addShape('parallelogram')">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 20L10 4H22L18 20H6Z"/></svg>
                            <span class="text-xs">Parallelogram</span>
                        </button>
                    </div>
                </div>

                <div>
                    <h3 class="text-sm uppercase tracking-wider text-[var(--text-muted)] font-semibold mb-3">Lines</h3>
                    <p class="text-xs text-[var(--text-muted)] mb-3 italic">Shift-click two lines to measure angle.</p>
                    <div class="grid grid-cols-2 gap-2">
                        <button class="p-2 border rounded hover:border-[var(--accent)] hover:text-[var(--accent)] flex flex-col items-center gap-1 transition-colors" onclick="addShape('segment')">
                            <svg width="24" height="24" viewBox="0 0 24 24"><path d="M6 18 L18 6" stroke="currentColor" stroke-width="2"/><circle cx="6" cy="18" r="2.5" fill="var(--accent)" stroke="currentColor"/><circle cx="18" cy="6" r="2.5" fill="var(--accent)" stroke="currentColor"/></svg>
                            <span class="text-xs">Segment</span>
                        </button>
                        <button class="p-2 border rounded hover:border-[var(--accent)] hover:text-[var(--accent)] flex flex-col items-center gap-1 transition-colors" onclick="addShape('line')">
                            <svg width="24" height="24" viewBox="0 0 24 24"><path d="M2 22 L22 2" stroke="currentColor" stroke-width="2"/><circle cx="8" cy="16" r="2.5" fill="var(--accent)" stroke="currentColor"/><circle cx="16" cy="8" r="2.5" fill="var(--accent)" stroke="currentColor"/></svg>
                            <span class="text-xs">Line</span>
                        </button>
                        <button class="p-2 border rounded hover:border-[var(--accent)] hover:text-[var(--accent)] flex flex-col items-center gap-1 transition-colors" onclick="addShape('ray')">
                            <svg width="24" height="24" viewBox="0 0 24 24"><path d="M6 18 L22 2" stroke="currentColor" stroke-width="2"/><circle cx="6" cy="18" r="2.5" fill="var(--accent)" stroke="currentColor"/><circle cx="16" cy="8" r="2.5" fill="var(--accent)" stroke="currentColor"/></svg>
                            <span class="text-xs">Ray</span>
                        </button>
                        <button class="p-2 border rounded hover:border-[var(--accent)] hover:text-[var(--accent)] flex flex-col items-center gap-1 transition-colors" onclick="addShape('vector')">
                            <svg width="24" height="24" viewBox="0 0 24 24"><path d="M6 18 L16 8" stroke="currentColor" stroke-width="2"/><polygon points="17,7 12,8 16,12" fill="currentColor"/><circle cx="6" cy="18" r="2.5" fill="var(--accent)" stroke="currentColor"/><circle cx="17" cy="7" r="2.5" fill="var(--accent)" stroke="currentColor"/></svg>
                            <span class="text-xs">Vector</span>

                    </div>
                </div>

                <div id="shape-properties" class="hidden">
                    <h3 class="text-sm uppercase tracking-wider text-[var(--text-muted)] font-semibold mb-3">Properties</h3>
                    <div class="flex gap-2 mb-2">
                        <input type="color" id="shape-color" class="w-10 h-10 p-0 border-0 rounded cursor-pointer" onchange="updateSelectedShapeColor(this.value)">
                        <button class="flex-1 border rounded text-red-500 hover:bg-red-500/10 transition-colors" onclick="deleteSelectedShape()">
                            <i class="fa-solid fa-trash"></i> Delete
                        </button>
                    </div>
                </div>

                <div>
                    <h3 class="text-sm uppercase tracking-wider text-[var(--text-muted)] font-semibold mb-3">View</h3>
                    <div class="flex flex-col gap-2">
                        <label class="flex items-center gap-2 cursor-pointer text-sm">
                            <input type="checkbox" id="toggle-grid" checked onchange="toggleGrid()"> Show Grid
                        </label>
                        <div class="flex gap-2 mt-2">
                            <button class="flex-1 p-2 border rounded hover:bg-[var(--border)] transition-colors" onclick="zoomView(1.2)"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
                            <button class="flex-1 p-2 border rounded hover:bg-[var(--border)] transition-colors" onclick="zoomView(0.8)"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
                            <button class="flex-1 p-2 border rounded hover:bg-[var(--border)] transition-colors" onclick="fitToScreen()"><i class="fa-solid fa-expand"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="graph-tools" class="p-4 space-y-6 hidden w-full h-full">
                <div>
                    <h3 class="text-sm uppercase tracking-wider text-[var(--text-muted)] font-semibold mb-3">Functions</h3>
                    <div id="functions-list" class="space-y-3">
                        <!-- Functions will be injected here -->
                    </div>
                    <button class="w-full mt-3 p-2 border rounded text-sm hover:border-[var(--accent)] transition-colors" onclick="addFunction()">
                        <i class="fa-solid fa-plus"></i> Add Function
                    </button>
                </div>
                <div>
                    <h3 class="text-sm uppercase tracking-wider text-[var(--text-muted)] font-semibold mb-3">Graph View</h3>
                    <div class="flex flex-col gap-2">
                        <label class="flex items-center gap-2 cursor-pointer text-sm">
                            <input type="checkbox" id="toggle-graph-grid" checked onchange="toggleGrid()"> Show Grid
                        </label>
                        <div class="flex gap-2 mt-2">
                            <button class="flex-1 p-2 border rounded hover:bg-[var(--border)] transition-colors" onclick="zoomView(1.2)"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
                            <button class="flex-1 p-2 border rounded hover:bg-[var(--border)] transition-colors" onclick="zoomView(0.8)"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
                            <button class="flex-1 p-2 border rounded hover:bg-[var(--border)] transition-colors" onclick="fitToScreen()"><i class="fa-solid fa-expand"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Canvas Area -->
        <section class="flex-1 relative cursor-crosshair overflow-hidden" style="background-color: var(--canvas-bg);">
            <canvas id="main-canvas" class="absolute inset-0 w-full h-full"></canvas>
           
            <!-- Graph trace tooltip -->

                (x, y)
            </div>

            <!-- Presentation Floating Toolbar -->

                <button class="text-xl hover:text-[var(--accent)] transition-colors" onclick="toggleSpotlight()" title="Toggle Spotlight">
                    <i class="fa-solid fa-lightbulb"></i>
                </button>
                <button class="text-xl hover:text-[var(--accent)] transition-colors" onclick="toggleHighContrast()" title="High Contrast Mode">
